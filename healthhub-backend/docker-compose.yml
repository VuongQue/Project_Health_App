  #     - .env
  #   depends_on:
  #     mysql:
  #       condition: service_healthy
  #     mongo:
  #       condition: service_healthy
  #   networks:
  #     - healthhub_network
  #   volumes:
  #     - .:/app
  #   working_dir: /app

# ---------------------- VOLUMES ----------------------
volumes:
  mysql_data:
  mongo_data:
  es_data:

# ---------------------- NETWORK ----------------------
networks:
  healthhub_network:
    driver: bridge
