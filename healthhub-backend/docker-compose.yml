version: "3.9"

services:
  # ---------------------- MYSQL ----------------------
  mysql:
    image: mysql:8
    container_name: mysql_healthhub
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: healthhub
      MYSQL_USER: healthuser
      MYSQL_PASSWORD: 123456
    ports:
      - "3308:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthhub_network

  # ---------------------- MONGODB ----------------------
  mongo:
    image: mongo:7.0
    container_name: mongo_healthhub
    restart: always
    environment:
      MONGO_INITDB_DATABASE: healthhub
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - healthhub_network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: es_healthhub
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - healthhub_network

    # ---------------------- ZOOKEEPER ----------------------
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper_healthhub
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - healthhub_network

  # ---------------------- KAFKA ----------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka_healthhub
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - healthhub_network


  # ---------------------- REDIS ----------------------
  redis:
    image: redis:7-alpine
    container_name: redis_healthhub
    restart: always
    ports:
      - "6379:6379"
    networks:
      - healthhub_network

  # ---------------------- BACKEND APP ----------------------
  # backend:
  #   build: .
  #   container_name: healthhub_backend
  #   restart: always
  #   command: npm run start:prod
  #   ports:
  #     - "4000:4000"
