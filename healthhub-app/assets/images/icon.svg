<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A7FE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0EC4C4;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bgGrad)"/>

  <!-- Heart shape (white) — drawn with bezier, center at 512,460 -->
  <path d="
    M512 750
    C500 738 270 590 200 420
    C168 340 175 230 260 185
    C310 160 375 168 420 200
    C455 224 485 260 512 295
    C539 260 569 224 604 200
    C649 168 714 160 764 185
    C849 230 856 340 824 420
    C754 590 524 738 512 750 Z
  "
  fill="white"
  />

  <!-- ECG line entirely inside heart — no clipPath needed -->
  <!-- Baseline y=460, peaks contained within heart bounds x:280-744 -->
  <polyline
    points="280,460  345,460  378,390  415,545  450,335  488,520  520,460  744,460"
    fill="none"
    stroke="#1A7FE8"
    stroke-width="32"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- HealthHub label -->
  <text x="512" y="940"
        text-anchor="middle"
        font-family="Arial Rounded MT Bold, Helvetica Neue, Arial, sans-serif"
        font-size="72"
        font-weight="bold"
        letter-spacing="5"
        fill="rgba(255,255,255,0.92)">HealthHub</text>
</svg>
